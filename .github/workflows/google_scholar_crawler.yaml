name: Get Citation Data

on: 
 page_build: 
 workflow_dispatch:
 schedule:
  - cron:  '0 8 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Install Reqs
      run: |
        sudo apt-get install python3-setuptools
    - name: Run
      env:
        GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
      run: |
        cd ./google_scholar_crawler
        pip3 install -r requirements.txt
        mkdir -p results

        # Limit runtime; do not fail whole workflow on timeout
        timeout 300 python -u main.py || echo "crawler timeout, continue"

        # Ensure output files always exist so push step can proceed
        [ -f results/gs_data.json ] || echo '{"status":"timeout","papers":[]}' > results/gs_data.json
        [ -f results/citation_edges.json ] || echo '{"status":"timeout","edges":[]}' > results/citation_edges.json
        [ -f results/gs_data_shieldsio.json ] || echo '{"schemaVersion":1,"label":"citations","message":"timeout"}' > results/gs_data_shieldsio.json

        cd ./results
        git init
        git config --local user.name "${GITHUB_ACTOR}"
        git config --local user.email "${GITHUB_ACTOR}@users.noreply.github.com"

        git add *.json
        git commit -m "Updated Citation Data" || echo "No changes to commit"

        git branch -M google-scholar-stats
        export remote_repo="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
        git remote add origin "${remote_repo}"
        git push origin google-scholar-stats --force
